name: MLOps Pipeline

on:
  push:
    branches: [main]
    paths:
      - 'data/**.dvc'
      - 'src/**.py'
      - 'tests/**.py'
      - 'params.yaml'
      - '.github/workflows/mlops.yml'
  workflow_dispatch:

jobs:
  test:
    name: Unit Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: pytest tests/ -v

  train:
    name: Train
    needs: test
    runs-on: ubuntu-latest
    outputs:
      accuracy: ${{ steps.read_metrics.outputs.accuracy }}
    env:
      CLOUD_BUCKET: ${{ secrets.CLOUD_BUCKET }}
      AWS_DEFAULT_REGION: us-east-1

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Authenticate to AWS
        run: |
          credentials_file="$RUNNER_TEMP/aws-credentials.json"
          cat > "$credentials_file" <<'EOF'
          ${{ secrets.CLOUD_CREDENTIALS }}
          EOF
          test -s "$credentials_file"
          test -n "$CLOUD_BUCKET"
          AWS_CREDENTIALS_FILE="$credentials_file" python - <<'EOF' >> "$GITHUB_ENV"
          import json
          import os

          with open(os.environ["AWS_CREDENTIALS_FILE"]) as f:
              credentials = json.load(f)

          print(f"AWS_ACCESS_KEY_ID={credentials['aws_access_key_id']}")
          print(f"AWS_SECRET_ACCESS_KEY={credentials['aws_secret_access_key']}")
          print(f"AWS_DEFAULT_REGION={credentials.get('aws_default_region', 'us-east-1')}")
          if credentials.get("aws_session_token"):
              print(f"AWS_SESSION_TOKEN={credentials['aws_session_token']}")
          EOF
          dvc remote add --force -d myremote "s3://$CLOUD_BUCKET/dvc"

      - name: Pull data with DVC
        run: dvc pull data/train_phase1.csv.dvc data/train_phase2.csv.dvc data/eval.csv.dvc -v

      - name: Train model
        run: python src/train.py

      - name: Read metrics
        id: read_metrics
        run: |
          accuracy=$(python - <<'EOF'
          import json

          with open("outputs/metrics.json") as f:
              metrics = json.load(f)
          print(metrics["accuracy"])
          EOF
          )
          echo "accuracy=$accuracy" >> "$GITHUB_OUTPUT"
          echo "Accuracy: $accuracy"

      - name: Upload model to S3
        run: |
          python - <<'EOF'
          import os
          import boto3

          bucket_name = os.environ["CLOUD_BUCKET"]
          region = os.environ.get("AWS_DEFAULT_REGION", "us-east-1")
          client = boto3.client("s3", region_name=region)
          client.upload_file("models/model.pkl", bucket_name, "models/latest/model.pkl")
          print(f"Uploaded models/model.pkl to s3://{bucket_name}/models/latest/model.pkl")
          EOF

      - name: Save metrics as artifact
        uses: actions/upload-artifact@v4
        with:
          name: metrics
          path: outputs/metrics.json

  eval:
    name: Eval
    needs: train
    runs-on: ubuntu-latest
    steps:
      - name: Check eval gate
        run: |
          python - <<'EOF'
          threshold = 0.70
          acc = float("${{ needs.train.outputs.accuracy }}")

          if acc < threshold:
              raise SystemExit(
                  f"FAILED: accuracy {acc:.4f} < {threshold:.2f}. Huy deploy."
              )

          print(f"PASSED: accuracy {acc:.4f} >= {threshold:.2f}. Dang trien khai model.")
          EOF

  deploy:
    name: Deploy
    needs: eval
    runs-on: ubuntu-latest
    steps:
      - name: SSH deploy to VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            set -e
            sudo systemctl restart mlops-serve

            for i in $(seq 1 12); do
              if curl -sf http://localhost:8000/health; then
                echo "Health check passed."
                exit 0
              fi
              echo "Waiting for mlops-serve... attempt $i/12"
              sleep 5
            done

            sudo systemctl status mlops-serve --no-pager || true
            sudo journalctl -u mlops-serve -n 50 --no-pager || true
            exit 1
